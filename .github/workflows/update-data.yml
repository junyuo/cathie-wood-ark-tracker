name: Update ARK holdings data

on:
  schedule:
    - cron: "30 11 * * 2-6"
  workflow_dispatch:

concurrency:
  group: update-ark-data
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch and build data
        id: build-data
        run: |
          set +e
          python scripts/fetch_ark_holdings.py
          FETCH_EXIT=$?

          PIPELINE_EXIT=$FETCH_EXIT
          if [ "$FETCH_EXIT" -eq 0 ]; then
            python scripts/normalize_holdings.py
            NORMALIZE_EXIT=$?
            PIPELINE_EXIT=$NORMALIZE_EXIT

            if [ "$NORMALIZE_EXIT" -eq 0 ]; then
              python scripts/compare_daily_trades.py
              COMPARE_EXIT=$?
              python scripts/calculate_summary.py
              SUMMARY_EXIT=$?
              python scripts/calculate_performance.py
              PERFORMANCE_EXIT=$?

              if [ "$COMPARE_EXIT" -ne 0 ]; then PIPELINE_EXIT=$COMPARE_EXIT; fi
              if [ "$SUMMARY_EXIT" -ne 0 ]; then PIPELINE_EXIT=$SUMMARY_EXIT; fi
              if [ "$PERFORMANCE_EXIT" -ne 0 ]; then PIPELINE_EXIT=$PERFORMANCE_EXIT; fi
            fi
          fi

          echo "pipeline_exit=$PIPELINE_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ARK holdings data"
          file_pattern: "public/data/*.json"

      - name: Fail when data update failed
        if: steps.build-data.outputs.pipeline_exit != '0'
        run: |
          echo "::error title=ARK holdings update failed::The official ARK holdings fetch/build pipeline failed. Existing public holdings were preserved. Check public/data/fetch_diagnostics.json and public/data/data_status.json for the root-cause evidence."
          {
            echo "## ARK holdings update failed"
            echo
            echo "Existing public holdings were preserved."
            echo
            echo "Review these files after the auto-commit step:"
            echo
            echo "- public/data/fetch_diagnostics.json"
            echo "- public/data/data_status.json"
            echo
            echo "Pipeline exit code: ${{ steps.build-data.outputs.pipeline_exit }}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
