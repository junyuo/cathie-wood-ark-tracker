<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cathie Wood ARK Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <link id="production-style" rel="stylesheet" href="/cathie-wood-ark-tracker/assets/app.css" />
    <script type="module">
      const isLocalDev = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      if (isLocalDev) {
        document.getElementById("production-style")?.remove();
        await import("/src/main.tsx");
      } else {
        await import("/cathie-wood-ark-tracker/assets/app.js");
      }
    </script>
  </body>
</html>
