<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cathie Wood ARK Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || root.children.length > 0 || root.textContent.trim()) return;

        var repoBase = "/cathie-wood-ark-tracker/";
        var base = window.location.pathname.indexOf(repoBase) === 0 ? repoBase : "/";
        root.innerHTML =
          '<main style="max-width:960px;margin:0 auto;padding:32px 20px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#111827">' +
          '<p style="margin:0 0 8px;color:#1f4f46;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase">ARK Invest public ETF holdings</p>' +
          '<h1 style="margin:0 0 12px;font-size:30px;line-height:1.2">Cathie Wood ARK Tracker</h1>' +
          '<section style="border:1px solid #e2e8f0;border-radius:8px;background:#fff;padding:18px;box-shadow:0 1px 2px rgba(15,23,42,.06)">' +
          '<h2 style="margin:0 0 8px;font-size:18px">Site bundle did not load</h2>' +
          '<p style="margin:0 0 12px;color:#475569;line-height:1.6">GitHub Pages is currently serving the repository source index instead of the Vite build output. Set Pages source to GitHub Actions, then rerun Deploy GitHub Pages.</p>' +
          '<div id="fallback-status" style="color:#475569;font-size:14px">Loading data status...</div>' +
          '</section>' +
          '</main>';

        fetch(base + "data/data_status.json")
          .then(function (response) {
            if (!response.ok) throw new Error("HTTP " + response.status);
            return response.json();
          })
          .then(function (status) {
            var el = document.getElementById("fallback-status");
            if (!el) return;
            var funds = status.funds || {};
            var rows = Object.keys(funds)
              .map(function (fund) {
                var item = funds[fund] || {};
                return fund + ": " + (item.status || "unknown") + " (" + (item.rowCount || 0) + " rows)";
              })
              .join("<br>");
            el.innerHTML =
              "<strong>Data status:</strong><br>" +
              "Sample data: " + String(Boolean(status.isSampleData)) + "<br>" +
              "Last successful update: " + (status.lastSuccessfulUpdate || "none") + "<br>" +
              "Latest holding date: " + (status.latestHoldingDate || "none") + "<br><br>" +
              rows;
          })
          .catch(function (error) {
            var el = document.getElementById("fallback-status");
            if (el) el.textContent = "Data status could not be loaded: " + error.message;
          });
      }, 1500);
    </script>
  </body>
</html>
