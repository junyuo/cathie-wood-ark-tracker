name: Update ARK holdings data

on:
  schedule:
    - cron: "30 11 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch and build data
        run: |
          python scripts/fetch_ark_holdings.py
          python scripts/normalize_holdings.py
          python scripts/compare_daily_trades.py
          python scripts/calculate_summary.py
          python scripts/calculate_performance.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ARK holdings data"
          file_pattern: "public/data/*.json"
